server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver MIME Types para .mjs
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    # --- PROXIES LOCAIS PARA O TOWNSQUARE (Bypass Seguro de CORS) ---
    # Tudo o que bater no Nginx local, é encaminhado para o contentor TownSquare (porta 8080 interna)
    # ou para a porta 3004 da sua rede caso use network externa.
    location /live {
        proxy_pass http://172.17.0.1:3004/live;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
    location /chat { 
        proxy_pass http://172.17.0.1:3004/chat; 
        proxy_set_header Host $host;
    }
    location /action { 
        proxy_pass http://172.17.0.1:3004/action; 
        proxy_set_header Host $host;
    }
    location /state { 
        proxy_pass http://172.17.0.1:3004/state; 
        proxy_set_header Host $host;
    }

    # --- Configuração padrão React ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}