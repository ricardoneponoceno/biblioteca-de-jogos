server {
    # Escuta na porta 80 (Insegura) e redireciona tudo para a porta segura (HTTPS)
    listen 80;
    server_name laricks-biblioteca.duckdns.org localhost;
    
    location / {
        return 301 https://$host:8443$request_uri;
    }
}

server {
    # Escuta na porta 443 para conexões seguras (HTTPS e WSS)
    listen 443 ssl;
    server_name laricks-biblioteca.duckdns.org localhost;

    # Caminho dos certificados gerados pelo Certbot para o seu DuckDNS
    ssl_certificate /etc/letsencrypt/live/laricks-biblioteca.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/laricks-biblioteca.duckdns.org/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================
    # REGRAS DE ROTEAMENTO: TOWNSQUARE (MULTIPLAYER)
    # ==========================================

    # 1. Roteamento de WebSockets Seguros (WSS)
    location /live {
        proxy_pass http://townsquare:8787/live;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Extensões para evitar queda de conexão nos WebSockets
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 2. Roteamento de Módulos JS
    location ~ \.mjs$ {
        proxy_pass http://townsquare:8787;
        proxy_set_header Host $host;
        proxy_hide_header Content-Type;
        add_header Content-Type application/javascript always;
        add_header Access-Control-Allow-Origin "*" always; 
    }

    # 3. Roteamento de Estilos 
    location ~ \.css$ {
        proxy_pass http://townsquare:8787;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # 4. Roteamento de Assets Internos (Avatares, Ícones)
    location /widget/ {
        proxy_pass http://townsquare:8787/widget/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /public/ {
        proxy_pass http://townsquare:8787/public/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ==========================================
    # REGRAS DE ROTEAMENTO: BIBLIOTECA DE JOGOS
    # ==========================================

    location / {
        try_files $uri $uri/ /index.html;
    }
}