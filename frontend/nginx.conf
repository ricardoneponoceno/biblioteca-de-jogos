server {
    listen 80;
    server_name localhost;

    # Define a raiz do frontend React
    root /usr/share/nginx/html;
    index index.html;

    # ==========================================
    # REGRAS DE ROTEAMENTO: TOWNSQUARE (MULTIPLAYER)
    # ==========================================

    # 1. Roteamento de WebSockets (Chat e Movimento em tempo real)
    location /live {
        proxy_pass http://townsquare:8787/live;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Roteamento de Módulos JS (Resolve o erro "Strict MIME type")
    location ~ \.mjs$ {
        proxy_pass http://townsquare:8787;
        proxy_set_header Host $host;
        proxy_hide_header Content-Type;
        add_header Content-Type application/javascript always;
    }

    # 3. Roteamento de Estilos (Permite o carregamento do visual da praça)
    location ~ \.css$ {
        proxy_pass http://townsquare:8787;
        proxy_set_header Host $host;
    }

    # 4. Roteamento de Assets Internos (Avatares, Ícones e Componentes)
    location /widget/ {
        proxy_pass http://townsquare:8787/widget/;
        proxy_set_header Host $host;
    }

    location /public/ {
        proxy_pass http://townsquare:8787/public/;
        proxy_set_header Host $host;
    }

    # ==========================================
    # REGRAS DE ROTEAMENTO: BIBLIOTECA DE JOGOS
    # ==========================================

    # Roteamento padrão para Single Page Applications (SPA - React)
    location / {
        try_files $uri $uri/ /index.html;
    }
}