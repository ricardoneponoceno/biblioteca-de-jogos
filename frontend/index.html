<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laricks Biblioteca de Jogos</title>
  
  <link rel="icon" type="image/png" href="https://icons.veryicon.com/png/o/object/color-game-icon/game-controller-6.png">
  
  <!-- CSS DO TOWNSQUARE -->
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/widget.css">

  <script>
      // Apaga qualquer configuração antiga do TownSquare guardada na memória do navegador
      try {
          localStorage.removeItem('townsquare-server');
          localStorage.removeItem('townsquare-room');
      } catch(e) {}
  </script>

  <!-- Bibliotecas -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Usamos o Babel 6, que NÃO cracha com scripts nativos -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- Absoluto, não relativo: sob /u/:username (Fase 3c da #3) um caminho
       relativo resolveria pra /u/config.js, que não existe — cai no fallback
       do nginx (index.html, HTML em vez de JS) e quebra o parse. -->
  <script src="/config.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; }
    .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 50; }
    .genre-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; align-content: flex-start; }
    .genre-tag { background-color: rgba(255, 255, 255, 0.1); color: #e2e8f0; padding: 2px 8px; border-radius: 4px; font-size: 0.70rem; font-weight: 500; white-space: nowrap; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    
    #townsquare-target {
        position: relative;
        width: 100%;
        min-height: 250px;
        z-index: 40;
    }
  </style>
</head>
<body>

  <!-- ========================================================================= -->
  <!-- APLICAÇÃO REACT (Biblioteca de Jogos Limpa)                               -->
  <!-- ========================================================================= -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    
    const hostname = window.location.hostname;
    const isLocalNetwork = hostname === 'localhost' || hostname.startsWith('192.168.') || hostname.startsWith('172.') || hostname.startsWith('10.');

    let BACKEND_URL = typeof API_BASE_URL !== 'undefined' && API_BASE_URL 
      ? API_BASE_URL 
      : (isLocalNetwork ? `${window.location.protocol}//${hostname}:3000` : 'https://api.laricks.com.br');
    
    const PLATAFORMAS = ['Amazon Games', 'EA App', 'EPIC', 'EPIC Larissa', 'EPIC Ricardo', 'GOG', 'Nintendo 3ds', 'Nintendo Switch', 'Nintendo Switch 2', 'Ubisoft', 'Steam'];

    // Decodifica o payload de um JWT sem verificar assinatura — só pra ler is_admin/
    // usuario_id no cliente. A verificação de verdade é sempre feita pelo backend.
    function decodeJwt(token) {
      try {
        const payload = token.split('.')[1];
        return JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
      } catch (e) {
        return null;
      }
    }

    // Header Authorization só nas chamadas pro NOSSO backend — não pros proxies
    // RAWG/HLTB (outra origem; anexar um header customizado lá geraria preflight
    // de CORS desnecessário e eles nem esperam/usam esse header).
    axios.interceptors.request.use((config) => {
      const token = localStorage.getItem('gameLibToken');
      if (token && config.url && config.url.startsWith(BACKEND_URL)) {
        config.headers.Authorization = `Bearer ${token}`;
      }
      return config;
    });

    axios.interceptors.response.use(
      (response) => {
        // Renovação deslizante: se o backend mandou token novo, troca o guardado.
        const novoToken = response.headers['x-new-token'];
        if (novoToken) localStorage.setItem('gameLibToken', novoToken);
        return response;
      },
      (error) => {
        const url = (error.config && error.config.url) || '';
        const isOurBackend = url.startsWith(BACKEND_URL);
        // /login e /registro também respondem 401/400 em caso de credencial errada —
        // isso não é "sessão expirou", é a própria tela de login tratando o erro dela.
        const isAuthEndpoint = url.endsWith('/login') || url.endsWith('/registro');
        if (isOurBackend && !isAuthEndpoint && error.response && error.response.status === 401) {
          // Token inválido/expirado numa rota protegida — desloga e recarrega pra limpar todo o estado.
          localStorage.removeItem('gameLibToken');
          localStorage.removeItem('gameLibUsername');
          window.location.reload();
        }
        return Promise.reject(error);
      }
    );

    // readonly esconde editar/excluir por completo — usado no perfil de outra
    // pessoa (Fase 3c da #3), onde a lista nem tem posse_id/jogo canônico
    // editável associado (a API do perfil não devolve isso de propósito).
    function GameCard({ jogo, onEdit, onDelete, isAdmin, readonly }) {
      const formatarGameplay = (minutos) => {
        if (!minutos) return 'N/A';
        const horas = Math.floor(minutos / 60);
        const mins = minutos % 60;
        return `${horas}h ${mins}m`;
      };

      return (
        <div className="bg-gray-800 rounded-xl shadow-xl overflow-hidden flex flex-col justify-between transform hover:-translate-y-1 hover:shadow-2xl transition-all duration-300 group h-full border border-gray-700">
          <div className="relative overflow-hidden aspect-[3/4]">
            <img src={jogo.capa} alt={jogo.titulo} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onError={(e) => { e.target.onerror = null; e.target.src='https://placehold.co/600x800/1e293b/ffffff?text=Sem+Capa'; }} />
            <div className="absolute inset-0 bg-gradient-to-t from-gray-900 via-transparent to-transparent opacity-60"></div>
            {/* Remover é sobre a própria posse (não exige is_admin — é o que
                permite qualquer dono tirar um jogo da própria biblioteca);
                editar é sobre o jogo canônico e continua restrito ao admin. */}
            {!readonly && (
              <div className="absolute top-1 right-1 sm:top-2 sm:right-2 flex gap-1 sm:gap-2 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity duration-200">
                  {isAdmin && <button onClick={(e) => { e.stopPropagation(); onEdit(jogo); }} className="p-1.5 sm:p-2 bg-gray-900/80 hover:bg-blue-600 text-white rounded-full backdrop-blur-sm shadow-lg transition-colors"><svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3 sm:h-4 sm:w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg></button>}
                  <button onClick={(e) => { e.stopPropagation(); onDelete(jogo); }} className="p-1.5 sm:p-2 bg-gray-900/80 hover:bg-red-600 text-white rounded-full backdrop-blur-sm shadow-lg transition-colors"><svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3 sm:h-4 sm:w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm4 0a1 1 0 012 0v6a1 1 0 11-2 0V8z" clipRule="evenodd" /></svg></button>
              </div>
            )}
          </div>
          <div className="p-2 sm:p-4 flex flex-col flex-grow">
            <h2 className="text-sm sm:text-lg font-bold text-white leading-tight mb-1 line-clamp-2" title={jogo.titulo}>{jogo.titulo}</h2>
            {/* plataforma_nome é a plataforma real da posse (2a); plataforma (sem
                sufixo) é o texto livre legado da tabela jogos, só existe pra não
                quebrar a edição canônica (GameFormModal) até o cleanup da 2f. */}
            <p className="text-[10px] sm:text-xs font-semibold text-blue-400 uppercase tracking-wide mb-2 sm:mb-3">{jogo.plataforma_nome || jogo.plataforma}</p>
            {jogo.generos && jogo.generos.length > 0 && (
              <div className="genre-list mb-2 sm:mb-4">
                {jogo.generos.slice(0, 2).map(genero => <span key={genero} className="genre-tag">{genero}</span>)}
                {jogo.generos.length > 2 && <span className="genre-tag">+{jogo.generos.length - 2}</span>}
              </div>
            )}
            <div className="flex justify-between items-center pt-2 sm:pt-3 border-t border-gray-700 mt-auto">
              <div className="flex items-center text-gray-400 text-[10px] sm:text-xs" title="Tempo de Jogo">
                 <svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3 sm:h-4 sm:w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                 {formatarGameplay(jogo.gameplay_minutos)}
              </div>
              <span className={`text-[10px] sm:text-xs font-bold px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-md ${jogo.metacritic == null || jogo.metacritic === "N/A" || jogo.metacritic === undefined ? 'bg-gray-700 text-gray-300' : jogo.metacritic >= 75 ? 'bg-green-600/20 text-green-400 border border-green-600/30' : jogo.metacritic >= 50 ? 'bg-yellow-600/20 text-yellow-400 border border-yellow-600/30' : 'bg-red-600/20 text-red-400 border border-red-600/30'}`}>{jogo.metacritic || '-'}</span>
            </div>
          </div>
        </div>
      );
    }

    function GameFormModal({ jogo, onSave, onCancel, apiConfig, allGeneros }) {
      const emptyForm = { titulo: '', plataforma: '', lancamento: '', gameplay_horas: '', metacritic: '', capa: '', generos: [], rawg_id: null, hltb_id: null };
      const [formData, setFormData] = useState(emptyForm);
      const titleInputRef = useRef(null);

      // Painel de busca por fonte (RAWG/HLTB), uma de cada vez
      const [source, setSource] = useState('rawg');
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [searchMsg, setSearchMsg] = useState('');
      const [selected, setSelected] = useState(null);
      const [fields, setFields] = useState({});
      const [link, setLink] = useState('');
      const [saveError, setSaveError] = useState('');
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        if (jogo) {
          const lancamentoFormatado = jogo.lancamento ? new Date(jogo.lancamento).toISOString().split('T')[0] : '';
          const gameplayEmHoras = jogo.gameplay_minutos ? Math.round(jogo.gameplay_minutos / 60) : '';
          const generoIds = allGeneros.filter(g => jogo.generos && jogo.generos.includes(g.name)).map(g => g.id);
          setFormData(Object.assign({}, emptyForm, jogo, { lancamento: lancamentoFormatado, gameplay_horas: gameplayEmHoras, generos: generoIds }));
        } else {
          setFormData(emptyForm);
        }
      }, [jogo, allGeneros]);

      useEffect(() => { setTimeout(() => { if (titleInputRef.current) titleInputRef.current.focus(); }, 100); }, []);

      const handleChange = (e) => setFormData(p => Object.assign({}, p, { [e.target.name]: e.target.value }));
      const handleGeneroChange = (gId) => setFormData(p => Object.assign({}, p, { generos: p.generos.includes(gId) ? p.generos.filter(id => id !== gId) : p.generos.concat([gId]) }));
      const handleSubmit = async (e) => {
        e.preventDefault();
        setSaveError(''); setSaving(true);
        try {
          await onSave(formData);
        } catch (err) {
          setSaveError((err.response && err.response.data && err.response.data.error) || 'Erro ao salvar.');
        } finally {
          setSaving(false);
        }
      };

      const baseUrl = source === 'rawg' ? apiConfig.rawgApiUrl : apiConfig.hltbApiUrl;
      const resetSearch = () => { setResults([]); setSelected(null); setSearchMsg(''); };
      const switchSource = (s) => { setSource(s); resetSearch(); };

      const parseRef = (raw) => {
        const s = (raw || '').trim();
        if (!s) return '';
        const m = s.match(/\/(?:games?|game)\/([^\/?#]+)/i);
        return m ? m[1] : s;
      };

      const hltbHoras = (times) => {
        if (!times) return '';
        const ms = times.main_story, me = times.main_extra;
        if (typeof ms === 'number' && ms && typeof me === 'number' && me) return Math.round((ms + me) / 2);
        if (typeof ms === 'number' && ms) return Math.round(ms);
        return '';
      };

      const runSearch = async () => {
        const q = query.trim();
        if (!q || !baseUrl) return;
        setSearching(true); resetSearch();
        try {
          const res = await axios.get(`${baseUrl}/search/${encodeURIComponent(q)}`);
          const list = (res.data && res.data.results) || [];
          setResults(list);
          if (list.length === 0) setSearchMsg('Nenhum resultado encontrado nessa fonte.');
        } catch (e) { setSearchMsg('Erro ao buscar. Tente de novo.'); }
        setSearching(false);
      };

      const runByLink = async () => {
        const ref = parseRef(link);
        if (!ref || !baseUrl) return;
        setSearching(true); resetSearch();
        try {
          const res = await axios.get(`${baseUrl}/game/${encodeURIComponent(ref)}`);
          if (res.data) selectCandidate(res.data);
        } catch (e) { setSearchMsg('Não encontrei esse link/id nessa fonte.'); }
        setSearching(false);
      };

      const selectCandidate = (c) => {
        setSelected(c);
        if (source === 'rawg') setFields({ titulo: true, lancamento: true, metacritic: true, capa: true });
        else setFields({ titulo: true, gameplay_horas: true, capa: true });
      };
      const toggleField = (f) => setFields(p => Object.assign({}, p, { [f]: !p[f] }));

      const importSelected = () => {
        if (!selected) return;
        setFormData(p => {
          const next = Object.assign({}, p);
          if (source === 'rawg') next.rawg_id = selected.rawg_id;
          else next.hltb_id = selected.hltb_id;
          if (fields.titulo && selected.name) next.titulo = selected.name;
          if (fields.capa && selected.image_url) next.capa = selected.image_url;
          if (source === 'rawg') {
            if (fields.lancamento && selected.released) next.lancamento = selected.released;
            if (fields.metacritic && (selected.metacritic || selected.metacritic === 0)) next.metacritic = selected.metacritic;
          } else {
            if (fields.gameplay_horas) { const h = hltbHoras(selected.times); if (h) next.gameplay_horas = h; }
          }
          return next;
        });
        resetSearch(); setLink('');
      };

      const importFields = source === 'rawg'
        ? [ { key: 'titulo', label: 'Título', val: selected && selected.name },
            { key: 'lancamento', label: 'Lançamento', val: selected && selected.released },
            { key: 'metacritic', label: 'Metacritic', val: selected && selected.metacritic },
            { key: 'capa', label: 'Capa', val: selected && selected.image_url ? 'imagem' : null } ]
        : [ { key: 'titulo', label: 'Título', val: selected && selected.name },
            { key: 'gameplay_horas', label: 'Gameplay (h)', val: selected ? hltbHoras(selected.times) : '' },
            { key: 'capa', label: 'Capa', val: selected && selected.image_url ? 'imagem' : null } ];
      const otherLinked = source === 'rawg' ? formData.hltb_id : formData.rawg_id;
      const otherLabel = source === 'rawg' ? 'HLTB' : 'RAWG';
      const badge = (label, id) => <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${id ? 'bg-green-600/20 text-green-400 border border-green-600/30' : 'bg-gray-700 text-gray-500'}`}>{label}{id ? ` ✓ ${id}` : ''}</span>;

      return (
        <div className="modal-backdrop p-4">
          <div className="bg-gray-800 text-white rounded-xl shadow-2xl w-full max-w-5xl overflow-hidden border border-gray-700 flex flex-col max-h-[92vh]">
            <div className="flex items-center justify-between px-6 py-4 border-b border-gray-700">
              <h2 className="text-2xl font-bold text-white">{jogo ? 'Editar Jogo' : 'Adicionar Jogo ao Catálogo'}</h2>
              <div className="flex items-center gap-2">{badge('RAWG', formData.rawg_id)}{badge('HLTB', formData.hltb_id)}</div>
            </div>
            {saveError && <div className="mx-6 mt-4 px-4 py-2.5 rounded-lg bg-red-600/20 border border-red-600/30 text-red-300 text-sm">{saveError}</div>}

            <div className="grid grid-cols-1 md:grid-cols-2 overflow-hidden flex-grow">
              <form onSubmit={handleSubmit} id="game-form" className="p-6 overflow-y-auto space-y-4 border-b md:border-b-0 md:border-r border-gray-700">
                <div className="space-y-2">
                  <label className="block text-sm font-semibold text-gray-300">Título</label>
                  <input ref={titleInputRef} name="titulo" value={formData.titulo} onChange={handleChange} placeholder="Ex: The Witcher 3" required className="w-full p-2.5 bg-gray-900/50 rounded-lg border border-gray-600 focus:border-blue-500 outline-none" />
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div className="space-y-2">
                    <label className="block text-sm font-semibold text-gray-300">Plataforma</label>
                    <select name="plataforma" value={formData.plataforma} onChange={handleChange} required className="w-full p-2.5 bg-gray-900/50 rounded-lg border border-gray-600 focus:border-blue-500 outline-none">
                      <option value="" disabled>Selecione...</option>
                      {PLATAFORMAS.map(p => <option key={p} value={p}>{p}</option>)}
                    </select>
                  </div>
                  <div className="space-y-2">
                    <label className="block text-sm font-semibold text-gray-300">Lançamento</label>
                    <input name="lancamento" type="date" value={formData.lancamento} onChange={handleChange} className="w-full p-2.5 bg-gray-900/50 rounded-lg border border-gray-600 focus:border-blue-500 outline-none" />
                  </div>
                  <div className="space-y-2">
                    <label className="block text-sm font-semibold text-gray-300">Gameplay (Horas)</label>
                    <input name="gameplay_horas" type="number" value={formData.gameplay_horas} onChange={handleChange} className="w-full p-2.5 bg-gray-900/50 rounded-lg border border-gray-600 focus:border-blue-500 outline-none" />
                  </div>
                  <div className="space-y-2">
                    <label className="block text-sm font-semibold text-gray-300">Metacritic</label>
                    <input name="metacritic" type="number" value={formData.metacritic} onChange={handleChange} min="0" max="100" className="w-full p-2.5 bg-gray-900/50 rounded-lg border border-gray-600 focus:border-blue-500 outline-none" />
                  </div>
                </div>
                <div className="space-y-2">
                  <label className="block text-sm font-semibold text-gray-300">URL da Capa</label>
                  <div className="flex gap-4">
                    <input name="capa" value={formData.capa} onChange={handleChange} className="flex-grow p-2.5 bg-gray-900/50 rounded-lg border border-gray-600 focus:border-blue-500 outline-none" />
                    {formData.capa && <div className="w-12 h-16 bg-black rounded overflow-hidden flex-shrink-0 border border-gray-600"><img src={formData.capa} className="w-full h-full object-cover" onError={(e)=>e.target.style.display='none'} /></div>}
                  </div>
                </div>
                <div className="space-y-2">
                  <label className="block text-sm font-semibold text-gray-300">Gêneros</label>
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 bg-gray-900/50 p-3 rounded-lg border border-gray-600 max-h-32 overflow-y-auto">
                    {allGeneros.map(g => (
                      <label key={g.id} className="flex items-center space-x-2 cursor-pointer text-sm text-gray-300 hover:text-white">
                        <input type="checkbox" checked={formData.generos.includes(g.id)} onChange={() => handleGeneroChange(g.id)} className="form-checkbox bg-gray-700 border-gray-500 text-blue-500" />
                        <span>{g.name}</span>
                      </label>
                    ))}
                  </div>
                </div>
              </form>

              <div className="p-6 overflow-y-auto space-y-4" style={{backgroundColor:'#131c2b'}}>
                <div className="flex gap-2">
                  <button type="button" onClick={() => switchSource('rawg')} className={`flex-1 py-2 rounded-lg text-sm font-semibold ${source==='rawg' ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>RAWG</button>
                  <button type="button" onClick={() => switchSource('hltb')} className={`flex-1 py-2 rounded-lg text-sm font-semibold ${source==='hltb' ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>HowLongToBeat</button>
                </div>
                <p className="text-xs text-gray-400">Busque nesta fonte, escolha o jogo certo e importe os campos que quiser. Uma fonte de cada vez — o ano ajuda a distinguir jogos de mesmo nome (ex: remake).</p>
                {otherLinked ? <div className="text-xs bg-gray-800 border border-gray-700 rounded p-2 text-gray-300">Já vinculado ao <b>{otherLabel}</b> (id {otherLinked}).</div> : null}

                <div className="flex gap-2">
                  <input value={query} onChange={(e)=>setQuery(e.target.value)} onKeyDown={(e)=>{ if(e.key==='Enter'){ e.preventDefault(); runSearch(); } }} placeholder="Buscar por título..." className="flex-grow p-2.5 bg-gray-900 rounded-lg border border-gray-600 focus:border-blue-500 outline-none text-sm" />
                  <button type="button" onClick={runSearch} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-semibold">Buscar</button>
                </div>

                <details className="text-xs text-gray-400">
                  <summary className="cursor-pointer select-none">Não encontrou? Cole o link ou id da página do jogo</summary>
                  <div className="flex gap-2 mt-2">
                    <input value={link} onChange={(e)=>setLink(e.target.value)} placeholder={source==='rawg' ? 'rawg.io/games/... ou id' : 'howlongtobeat.com/game/... ou id'} className="flex-grow p-2 bg-gray-900 rounded border border-gray-600 outline-none text-gray-200" />
                    <button type="button" onClick={runByLink} className="px-3 bg-gray-700 hover:bg-gray-600 rounded">Ir</button>
                  </div>
                </details>

                {searching && <div className="text-cyan-400 text-sm animate-pulse">Buscando...</div>}
                {searchMsg && <div className="text-sm text-gray-400">{searchMsg}</div>}

                {selected ? (
                  <div className="bg-gray-800 border border-blue-600/40 rounded-lg p-3 space-y-3">
                    <div className="flex gap-3">
                      {selected.image_url && <img src={selected.image_url} className="w-12 h-16 object-cover rounded flex-shrink-0" onError={(e)=>e.target.style.display='none'} />}
                      <div className="min-w-0">
                        <div className="font-bold text-white text-sm">{selected.name} {selected.year ? <span className="text-gray-400 font-normal">({selected.year})</span> : null}</div>
                        <div className="text-xs text-gray-400">{source==='rawg' ? `id RAWG ${selected.rawg_id}` : `id HLTB ${selected.hltb_id}`}</div>
                      </div>
                    </div>
                    <div className="space-y-1">
                      <div className="text-xs text-gray-400 font-semibold">Importar:</div>
                      {importFields.map(f => (
                        <label key={f.key} className="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
                          <input type="checkbox" checked={!!fields[f.key]} onChange={()=>toggleField(f.key)} className="form-checkbox bg-gray-700 border-gray-500 text-blue-500" />
                          <span className="w-28 flex-shrink-0">{f.label}</span>
                          <span className="text-gray-400 truncate flex-1">{(f.val || f.val === 0) ? String(f.val) : '—'}</span>
                        </label>
                      ))}
                    </div>
                    <div className="flex gap-2">
                      <button type="button" onClick={importSelected} className="flex-1 py-2 bg-green-600 hover:bg-green-700 rounded-lg text-sm font-semibold">Importar pro formulário</button>
                      <button type="button" onClick={()=>setSelected(null)} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm">Voltar</button>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {results.map((r, i) => (
                      <button type="button" key={(source==='rawg'?r.rawg_id:r.hltb_id) || i} onClick={()=>selectCandidate(r)} className="w-full flex gap-3 items-center text-left bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg p-2">
                        {r.image_url ? <img src={r.image_url} className="w-10 h-14 object-cover rounded flex-shrink-0" onError={(e)=>e.target.style.display='none'} /> : <div className="w-10 h-14 bg-gray-700 rounded flex-shrink-0" />}
                        <div className="min-w-0">
                          <div className="text-sm text-white truncate">{r.name} {r.year ? <span className="text-gray-400">({r.year})</span> : null}</div>
                          <div className="text-xs text-gray-400 truncate">
                            {source==='rawg'
                              ? `${r.metacritic ? 'Metacritic '+r.metacritic+' · ' : ''}${r.added ? r.added.toLocaleString('pt-BR')+' coleções' : ''}`
                              : `${r.times && r.times.main_story ? 'Main '+r.times.main_story+'h' : ''}`}
                          </div>
                        </div>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div className="bg-gray-900 p-4 flex justify-end gap-3 border-t border-gray-700">
              <button type="button" onClick={onCancel} className="px-5 py-2.5 bg-transparent hover:bg-gray-800 text-gray-300 font-semibold rounded-lg border border-gray-600">Cancelar</button>
              <button type="submit" form="game-form" disabled={saving} className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-lg shadow-lg transition-all transform hover:scale-105">{saving ? 'Salvando...' : 'Salvar'}</button>
            </div>
          </div>
        </div>
      );
    }
    
    function AuthModal({ onSuccess, onCancel }) {
      const [mode, setMode] = useState('login');
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [erro, setErro] = useState('');
      const [enviando, setEnviando] = useState(false);

      const trocarModo = (m) => { setMode(m); setErro(''); };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setErro(''); setEnviando(true);
        try {
          const rota = mode === 'login' ? 'login' : 'registro';
          const res = await axios.post(`${BACKEND_URL}/${rota}`, { username, password });
          localStorage.setItem('gameLibToken', res.data.token);
          localStorage.setItem('gameLibUsername', username.trim().toLowerCase());
          onSuccess();
        } catch (err) {
          setErro((err.response && err.response.data && err.response.data.error) || 'Erro ao processar.');
        } finally {
          setEnviando(false);
        }
      };

      return (
        <div className="modal-backdrop p-4">
          <div className="bg-gray-800 text-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border border-gray-700">
            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div className="flex gap-2">
                <button type="button" onClick={() => trocarModo('login')} className={`flex-1 py-2 rounded-lg text-sm font-semibold ${mode === 'login' ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>Entrar</button>
                <button type="button" onClick={() => trocarModo('registro')} className={`flex-1 py-2 rounded-lg text-sm font-semibold ${mode === 'registro' ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>Criar conta</button>
              </div>
              {erro && <div className="px-3 py-2 rounded-lg bg-red-600/20 border border-red-600/30 text-red-300 text-sm">{erro}</div>}
              <div className="space-y-2">
                <label className="block text-sm font-semibold text-gray-300">Username</label>
                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} required autoFocus className="w-full p-2.5 bg-gray-900/50 rounded-lg border border-gray-600 focus:border-blue-500 outline-none" />
              </div>
              <div className="space-y-2">
                <label className="block text-sm font-semibold text-gray-300">Senha</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required minLength={6} className="w-full p-2.5 bg-gray-900/50 rounded-lg border border-gray-600 focus:border-blue-500 outline-none" />
              </div>
              <div className="flex justify-end gap-3 pt-2">
                <button type="button" onClick={onCancel} className="px-5 py-2.5 bg-transparent hover:bg-gray-800 text-gray-300 font-semibold rounded-lg border border-gray-600">Cancelar</button>
                <button type="submit" disabled={enviando} className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-lg shadow-lg">{enviando ? 'Enviando...' : (mode === 'login' ? 'Entrar' : 'Criar conta')}</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // Fluxo de "adicionar à biblioteca" (Fase 2d da #1): busca no catálogo já
    // existente (GET /jogos), desambigua por lançamento + capa, e cria a posse
    // (POST /posses) escolhendo plataforma + data de aquisição. "Não encontrei"
    // delega o cadastro canônico pro GameFormModal já existente (is_admin) —
    // ao voltar de lá com um jogo novo criado, App reabre este modal com o
    // jogo já pré-selecionado (jogoInicial), pra completar o passo da posse.
    function AdicionarPosseModal({ onAdded, onCancel, onCadastrarNovo, plataformas, jogoInicial }) {
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [searched, setSearched] = useState(false);
      const [selectedJogo, setSelectedJogo] = useState(jogoInicial || null);
      const [plataformaId, setPlataformaId] = useState('');
      const [dataAquisicao, setDataAquisicao] = useState('');
      const [saveError, setSaveError] = useState('');
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        const q = query.trim();
        if (!q) { setResults([]); setSearched(false); return; }
        setSearching(true);
        const h = setTimeout(async () => {
          try {
            const res = await axios.get(`${BACKEND_URL}/jogos?titulo=${encodeURIComponent(q)}`);
            setResults((res.data && res.data.filteredGames) || []);
          } catch (err) {
            setResults([]);
          } finally {
            setSearching(false);
            setSearched(true);
          }
        }, 400);
        return () => clearTimeout(h);
      }, [query]);

      const capaFallback = (e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/100x140/1e293b/ffffff?text=?'; };

      const handleAdicionar = async (e) => {
        e.preventDefault();
        if (!plataformaId) { setSaveError('Escolha uma plataforma.'); return; }
        setSaveError(''); setSaving(true);
        try {
          await axios.post(`${BACKEND_URL}/posses`, {
            jogo_id: selectedJogo.id,
            plataforma_id: parseInt(plataformaId, 10),
            data_aquisicao: dataAquisicao || null,
          });
          onAdded();
        } catch (err) {
          setSaveError((err.response && err.response.data && err.response.data.error) || 'Erro ao adicionar à biblioteca.');
        } finally {
          setSaving(false);
        }
      };

      return (
        <div className="modal-backdrop p-4">
          <div className="bg-gray-800 text-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden border border-gray-700 flex flex-col max-h-[85vh]">
            <div className="flex items-center justify-between px-6 py-4 border-b border-gray-700">
              <h2 className="text-xl font-bold text-white">Adicionar à minha biblioteca</h2>
            </div>

            <div className="p-6 overflow-y-auto space-y-4 flex-grow">
              {!selectedJogo ? (
                <React.Fragment>
                  <input
                    autoFocus
                    value={query}
                    onChange={(e) => setQuery(e.target.value)}
                    placeholder="Buscar jogo no catálogo..."
                    className="w-full p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500"
                  />
                  {searching && <div className="text-cyan-400 text-sm animate-pulse">Buscando...</div>}
                  {!searching && searched && results.length === 0 && (
                    <div className="text-sm text-gray-400">Nenhum jogo encontrado no catálogo.</div>
                  )}
                  <div className="space-y-2">
                    {results.map((j) => (
                      <button
                        type="button"
                        key={j.id}
                        onClick={() => { setSelectedJogo(j); setSaveError(''); }}
                        className="w-full flex gap-3 items-center text-left bg-gray-900 hover:bg-gray-700 border border-gray-700 rounded-lg p-2"
                      >
                        <img src={j.capa} className="w-10 h-14 object-cover rounded flex-shrink-0" onError={capaFallback} />
                        <div className="min-w-0">
                          <div className="text-sm text-white truncate">{j.titulo}</div>
                          <div className="text-xs text-gray-400">{j.lancamento ? new Date(j.lancamento).getFullYear() : 'sem data'}</div>
                        </div>
                      </button>
                    ))}
                  </div>
                  <button type="button" onClick={onCadastrarNovo} className="w-full text-sm text-blue-400 hover:text-blue-300 underline pt-2">
                    Não encontrei, cadastrar jogo novo
                  </button>
                </React.Fragment>
              ) : (
                <form onSubmit={handleAdicionar} id="posse-form" className="space-y-4">
                  <div className="flex gap-3 items-center bg-gray-900 border border-gray-700 rounded-lg p-3">
                    <img src={selectedJogo.capa} className="w-12 h-16 object-cover rounded flex-shrink-0" onError={capaFallback} />
                    <div className="min-w-0">
                      <div className="font-bold text-white text-sm">{selectedJogo.titulo}</div>
                      <div className="text-xs text-gray-400">{selectedJogo.lancamento ? new Date(selectedJogo.lancamento).getFullYear() : ''}</div>
                    </div>
                  </div>
                  {saveError && <div className="px-3 py-2 rounded-lg bg-red-600/20 border border-red-600/30 text-red-300 text-sm">{saveError}</div>}
                  <div className="space-y-2">
                    <label className="block text-sm font-semibold text-gray-300">Plataforma</label>
                    <select value={plataformaId} onChange={(e) => setPlataformaId(e.target.value)} required className="w-full p-2.5 bg-gray-900/50 rounded-lg border border-gray-600 focus:border-blue-500 outline-none">
                      <option value="" disabled>Selecione...</option>
                      {plataformas.map((p) => <option key={p.id} value={p.id}>{p.nome}</option>)}
                    </select>
                  </div>
                  <div className="space-y-2">
                    <label className="block text-sm font-semibold text-gray-300">Data de aquisição (opcional)</label>
                    <input type="date" value={dataAquisicao} onChange={(e) => setDataAquisicao(e.target.value)} className="w-full p-2.5 bg-gray-900/50 rounded-lg border border-gray-600 focus:border-blue-500 outline-none" />
                  </div>
                  {!jogoInicial && <button type="button" onClick={() => setSelectedJogo(null)} className="text-sm text-gray-400 hover:text-gray-300 underline">Voltar pra busca</button>}
                </form>
              )}
            </div>

            <div className="bg-gray-900 p-4 flex justify-end gap-3 border-t border-gray-700">
              <button type="button" onClick={onCancel} className="px-5 py-2.5 bg-transparent hover:bg-gray-800 text-gray-300 font-semibold rounded-lg border border-gray-600">Cancelar</button>
              {selectedJogo && (
                <button type="submit" form="posse-form" disabled={saving} className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-lg shadow-lg">
                  {saving ? 'Adicionando...' : 'Adicionar à biblioteca'}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Era App() até a Fase 3c da #3 — renomeado quando App virou o roteador
    // (index vs. /u/:username), pra não confundir os dois papéis.
    function IndexPage() {
      // Fase 2d: a index passa a mostrar a biblioteca pessoal (minhas posses),
      // não mais o catálogo inteiro — cada item já vem com o dado do jogo
      // agregado (GET /biblioteca), mais posse_id/plataforma_nome/plataforma_id.
      const [biblioteca, setBiblioteca] = useState([]);
      // Fase 2g: modo catálogo (admin) — troca a fonte de dado pra GET /jogos
      // (o catálogo inteiro, não só minhas posses), com editar/excluir mirando
      // o jogo canônico. Só entra quem tem is_admin (o toggle nem aparece pra
      // quem não tem).
      const [modoCatalogo, setModoCatalogo] = useState(false);
      const [catalogo, setCatalogo] = useState([]);
      const [totalCatalogo, setTotalCatalogo] = useState(0);
      const [plataformas, setPlataformas] = useState([]);
      const [allGeneros, setAllGeneros] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [apiConfig, setApiConfig] = useState({});
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingGame, setEditingGame] = useState(null);
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      // true quando o GameFormModal foi aberto via "não encontrei" (dentro do
      // fluxo de adicionar à biblioteca) — ao salvar um jogo novo nesse caso,
      // volta pro AdicionarPosseModal com o jogo recém-criado pré-selecionado,
      // pra completar o passo da posse (plataforma + data).
      const [novoJogoParaPosse, setNovoJogoParaPosse] = useState(false);
      const [jogoParaPosseInicial, setJogoParaPosseInicial] = useState(null);
      const [isAdmin, setIsAdmin] = useState(() => {
        const token = localStorage.getItem('gameLibToken');
        const payload = token && decodeJwt(token);
        return !!(payload && payload.is_admin);
      });
      const [usuarioUsername, setUsuarioUsername] = useState(() => localStorage.getItem('gameLibUsername'));
      const [isAuthModalOpen, setIsAuthModalOpen] = useState(false);
      const [filters, setFilters] = useState({ titulo: '', plataforma: '', genero: '', gameplay_min: '', gameplay_max: '', metacritic_min: '', metacritic_max: '' });

      const handleAuthSuccess = () => {
        const payload = decodeJwt(localStorage.getItem('gameLibToken'));
        setIsAdmin(!!(payload && payload.is_admin));
        setUsuarioUsername(localStorage.getItem('gameLibUsername'));
        setIsAuthModalOpen(false);
      };

      const handleLogout = () => {
        localStorage.removeItem('gameLibToken');
        localStorage.removeItem('gameLibUsername');
        setIsAdmin(false);
        setUsuarioUsername(null);
      };

      useEffect(() => {
        const fetchInitialData = async () => {
            try {
              if (typeof BACKEND_URL === 'undefined') { setTimeout(fetchInitialData, 100); return; }
              const [cRes, gRes, pRes] = await Promise.all([
                axios.get(`${BACKEND_URL}/config`),
                axios.get(`${BACKEND_URL}/generos`),
                axios.get(`${BACKEND_URL}/plataformas`),
              ]);
              setApiConfig(cRes.data); setAllGeneros(gRes.data); setPlataformas(pRes.data);
            } catch (err) { setError("Falha na API."); }
        };
        fetchInitialData();
      }, []);

      // Sem usuário logado não existe biblioteca pra buscar — GET /biblioteca
      // exige token, e chamar sem ele derrubaria o interceptor de 401 (que
      // desloga/recarrega em qualquer 401 fora de /login e /registro).
      const fetchBiblioteca = useCallback(async (bg = false) => {
        if (modoCatalogo) return; // catálogo tem seu próprio fetch, abaixo
        if (!usuarioUsername) { setBiblioteca([]); if (!bg) setLoading(false); return; }
        try {
          if (!BACKEND_URL) return;
          if (!bg) setLoading(true);
          const res = await axios.get(`${BACKEND_URL}/biblioteca`);
          setBiblioteca(res.data); setError(null);
        } catch (err) { setError("Falha ao carregar biblioteca."); } finally { if (!bg) setLoading(false); }
      }, [usuarioUsername, modoCatalogo]);

      useEffect(() => { fetchBiblioteca(); }, [fetchBiblioteca]);

      // Modo catálogo usa os mesmos filtros, mas server-side (GET /jogos já
      // suporta) — o catálogo inteiro (328+ jogos) não escala bem filtrando
      // no cliente como a biblioteca pessoal (2d) faz.
      const fetchCatalogo = useCallback(async (bg = false) => {
        if (!modoCatalogo) return;
        try {
          if (!BACKEND_URL) return;
          if (!bg) setLoading(true);
          const params = new URLSearchParams();
          for (const key in filters) if (filters[key]) params.append(key, (key.includes('gameplay') ? filters[key]*60 : filters[key]));
          const res = await axios.get(`${BACKEND_URL}/jogos?${params.toString()}`);
          setCatalogo(res.data.filteredGames); setTotalCatalogo(res.data.totalGames); setError(null);
        } catch (err) { setError("Falha ao carregar catálogo."); } finally { if (!bg) setLoading(false); }
      }, [filters, modoCatalogo]);

      useEffect(() => { const h = setTimeout(() => fetchCatalogo(), 500); return () => clearTimeout(h); }, [filters, fetchCatalogo]);

      const handleFilterChange = (e) => setFilters(p => ({ ...p, [e.target.name]: e.target.value }));

      // Reseta os filtros ao trocar de modo — o dropdown de plataforma lista
      // conjuntos diferentes em cada modo (plataformas reais da posse vs. o
      // texto livre legado de jogos.plataforma), um valor não faz sentido no outro.
      const toggleModoCatalogo = () => {
        setModoCatalogo(m => !m);
        setFilters({ titulo: '', plataforma: '', genero: '', gameplay_min: '', gameplay_max: '', metacritic_min: '', metacritic_max: '' });
      };

      const handleSaveGame = async (gameData) => {
        // Erro não é capturado aqui de propósito: propaga pro GameFormModal, que
        // exibe inline (em vez do alert() nativo de antes) sem fechar o modal.
        const data = { ...gameData, gameplay_minutos: gameData.gameplay_horas ? parseInt(gameData.gameplay_horas, 10)*60 : null, metacritic: gameData.metacritic ? parseInt(gameData.metacritic, 10) : null };
        delete data.gameplay_horas;
        let jogoCriado = null;
        if (editingGame) {
           await axios.put(`${BACKEND_URL}/jogos/${editingGame.id}`, data);
        } else {
           const res = await axios.post(`${BACKEND_URL}/jogos`, data);
           jogoCriado = res.data;
        }
        setIsModalOpen(false); setEditingGame(null);
        if (jogoCriado && novoJogoParaPosse) {
          setJogoParaPosseInicial(jogoCriado);
          setIsAddModalOpen(true);
        }
        setNovoJogoParaPosse(false);
        fetchBiblioteca(true);
      };

      const handleRemoverPosse = async (item) => {
        if (window.confirm(`Remover "${item.titulo}" da sua biblioteca?`)) {
          try { await axios.delete(`${BACKEND_URL}/posses/${item.posse_id}`); fetchBiblioteca(true); } catch (err) { alert("Erro ao remover."); }
        }
      };

      // Exclui o jogo canônico (não uma posse) — posses.jogo_id tem ON DELETE
      // CASCADE, então isso apaga a posse de QUALQUER pessoa que tenha esse
      // jogo, não só a de quem está excluindo. O confirm avisa disso de propósito.
      const handleExcluirJogoCanonico = async (jogo) => {
        if (window.confirm(`Excluir "${jogo.titulo}" do catálogo? Isso remove esse jogo da biblioteca de qualquer pessoa que o possua, não só a sua.`)) {
          try { await axios.delete(`${BACKEND_URL}/jogos/${jogo.id}`); fetchCatalogo(true); } catch (err) { alert("Erro ao excluir."); }
        }
      };

      const handleDeleteCard = modoCatalogo ? handleExcluirJogoCanonico : handleRemoverPosse;

      if (error) return <h1 className="text-red-400 text-2xl text-center mt-10">{error}</h1>;

      // GameCard/GameFormModal esperam um campo "id" pro jogo canônico — a
      // biblioteca devolve isso como jogo_id (pra não colidir com posse_id).
      // Modo catálogo já vem pronto de GET /jogos (mesmo shape de antes da 2d,
      // já tem .id/.plataforma/.generos — filtro é server-side, sem reprocessar aqui).
      const itemsBiblioteca = biblioteca
        .filter(item => !filters.titulo || item.titulo.toLowerCase().includes(filters.titulo.toLowerCase()))
        .filter(item => !filters.plataforma || item.plataforma_nome === filters.plataforma)
        .filter(item => !filters.genero || (item.generos && item.generos.includes(filters.genero)))
        .filter(item => !filters.gameplay_min || item.gameplay_minutos >= filters.gameplay_min * 60)
        .filter(item => !filters.gameplay_max || item.gameplay_minutos <= filters.gameplay_max * 60)
        .filter(item => !filters.metacritic_min || item.metacritic >= filters.metacritic_min)
        .filter(item => !filters.metacritic_max || item.metacritic <= filters.metacritic_max)
        .map(item => ({ ...item, id: item.jogo_id }));

      const cardItems = modoCatalogo ? catalogo : itemsBiblioteca;
      const totalItems = modoCatalogo ? totalCatalogo : biblioteca.length;

      const plataformasComJogo = Array.from(new Set(biblioteca.map(item => item.plataforma_nome))).sort();

      return (
        <div className="container mx-auto p-4 sm:p-6 lg:p-8 pb-[300px]">
          <header className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
            <div className="text-center sm:text-left">
              <h1 className="text-4xl font-bold text-white">Laricks Biblioteca de Jogos</h1>
              {usuarioUsername && (
                <p className="text-gray-400 mt-2">
                  {Object.values(filters).some(v => v !== '') ? (
                    <span>Exibindo <span className="font-bold text-cyan-400">{cardItems.length}</span> de <span className="font-bold text-cyan-400">{totalItems}</span> jogos{modoCatalogo ? ' no catálogo' : ''}.</span>
                  ) : (
                    <span>Atualmente com <span className="font-bold text-cyan-400">{totalItems}</span> jogos {modoCatalogo ? 'no catálogo' : 'na sua biblioteca'}.</span>
                  )}
                </p>
              )}
            </div>
            <div className="flex items-center gap-3">
              {!usuarioUsername && (
                <button onClick={() => setIsAuthModalOpen(true)} className="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white font-semibold rounded-lg transition-colors flex-shrink-0">Entrar</button>
              )}
              {isAdmin && <button onClick={toggleModoCatalogo} className="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white font-semibold rounded-lg transition-colors flex-shrink-0">{modoCatalogo ? 'Voltar pra minha biblioteca' : 'Ver catálogo completo'}</button>}
              {usuarioUsername && !modoCatalogo && <button onClick={() => { setJogoParaPosseInicial(null); setIsAddModalOpen(true); }} className="px-4 py-2 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 transition-colors flex-shrink-0">Adicionar à minha biblioteca</button>}
              {/* Sanduíche à direita de tudo — abre o menuzinho de conta
                  (avatar + username + sair). "Adicionar" fica à esquerda dele
                  por ordem no DOM (flex row, sem rtl). */}
              {usuarioUsername && <MenuUsuario username={usuarioUsername} onLogout={handleLogout} />}
            </div>
          </header>

          {!usuarioUsername ? (
            <div className="flex flex-col items-center justify-center mt-20 text-center text-gray-500">
              <svg xmlns="http://www.w3.org/2000/svg" className="h-16 w-16 mb-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
              <p className="text-xl mb-4">Faça login pra ver sua biblioteca.</p>
              <button onClick={() => setIsAuthModalOpen(true)} className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg">Entrar</button>
            </div>
          ) : (
            <React.Fragment>
              <div className="bg-gray-800 p-4 rounded-lg mb-8 border border-gray-700">
                <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                  <input name="titulo" value={filters.titulo} onChange={handleFilterChange} placeholder="Buscar..." className="p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500" />
                  <select name="plataforma" value={filters.plataforma} onChange={handleFilterChange} className="p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500">
                    <option value="">Plataformas</option>{(modoCatalogo ? PLATAFORMAS : plataformasComJogo).map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                  <select name="genero" value={filters.genero} onChange={handleFilterChange} className="p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500">
                    <option value="">Gêneros</option>{allGeneros.map(g => <option key={g.id} value={g.name}>{g.name}</option>)}
                  </select>
                  <div className="flex gap-2">
                    <input name="gameplay_min" type="number" value={filters.gameplay_min} onChange={handleFilterChange} placeholder="Min (h)" className="w-full p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500" />
                    <input name="gameplay_max" type="number" value={filters.gameplay_max} onChange={handleFilterChange} placeholder="Máx (h)" className="w-full p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500" />
                  </div>
                  <div className="flex gap-2">
                    <input name="metacritic_min" type="number" value={filters.metacritic_min} onChange={handleFilterChange} placeholder="Meta Min" className="w-full p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500" />
                    <input name="metacritic_max" type="number" value={filters.metacritic_max} onChange={handleFilterChange} placeholder="Meta Máx" className="w-full p-2.5 bg-gray-900 text-white rounded border border-gray-600 focus:outline-none focus:border-blue-500" />
                  </div>
                </div>
              </div>

              {loading ? <div className="flex justify-center mt-20"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500"></div></div> : (
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 sm:gap-6">
                  {cardItems.length > 0 ? cardItems.map(item => <GameCard key={item.id} jogo={item} onEdit={(j)=>{setNovoJogoParaPosse(false);setEditingGame(j);setIsModalOpen(true);}} onDelete={handleDeleteCard} isAdmin={isAdmin && modoCatalogo} />) : <div className="col-span-full flex flex-col items-center justify-center mt-10 text-gray-500"><svg xmlns="http://www.w3.org/2000/svg" className="h-16 w-16 mb-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg><p className="text-xl">{modoCatalogo ? 'Nenhum jogo encontrado no catálogo.' : (biblioteca.length === 0 ? 'Sua biblioteca está vazia — adicione um jogo.' : 'Nenhum jogo encontrado com os filtros aplicados.')}</p></div>}
                </div>
              )}
            </React.Fragment>
          )}

          {isModalOpen && <GameFormModal jogo={editingGame} onSave={handleSaveGame} onCancel={()=>{setIsModalOpen(false);setEditingGame(null);setNovoJogoParaPosse(false);}} apiConfig={apiConfig} allGeneros={allGeneros} />}
          {isAuthModalOpen && <AuthModal onSuccess={handleAuthSuccess} onCancel={() => setIsAuthModalOpen(false)} />}
          {isAddModalOpen && (
            <AdicionarPosseModal
              plataformas={plataformas}
              jogoInicial={jogoParaPosseInicial}
              onAdded={() => { setIsAddModalOpen(false); setJogoParaPosseInicial(null); fetchBiblioteca(true); }}
              onCancel={() => { setIsAddModalOpen(false); setJogoParaPosseInicial(null); }}
              onCadastrarNovo={() => { setIsAddModalOpen(false); setNovoJogoParaPosse(true); setEditingGame(null); setIsModalOpen(true); }}
            />
          )}
        </div>
      );
    }

    // Cor determinística a partir do username — placeholder de avatar (Fase 3c
    // da #3; upload de imagem real fica pra quando existir storage de arquivo,
    // ver "Em aberto" na wiki).
    function corAvatar(username) {
      let hash = 0;
      for (let i = 0; i < username.length; i++) hash = username.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash) % 360}, 55%, 40%)`;
    }

    // Menu de conta no cabeçalho da index — o próprio avatar da pessoa (bolinha
    // colorida com a inicial do username) funciona como gatilho, deixando claro
    // que já está logado. Ao clicar, abre um dropdown pequeno (avatar + username,
    // link pro próprio perfil, e Sair embaixo). Fecha sozinho ao clicar fora.
    function MenuUsuario({ username, onLogout }) {
      const [aberto, setAberto] = useState(false);
      const menuRef = useRef(null);

      useEffect(() => {
        const fecharSeClicouFora = (e) => {
          if (menuRef.current && !menuRef.current.contains(e.target)) setAberto(false);
        };
        document.addEventListener('mousedown', fecharSeClicouFora);
        return () => document.removeEventListener('mousedown', fecharSeClicouFora);
      }, []);

      return (
        <div className="relative flex-shrink-0" ref={menuRef}>
          <button
            onClick={() => setAberto((a) => !a)}
            aria-label="Menu da conta"
            className="w-10 h-10 rounded-full flex items-center justify-center text-white text-sm font-bold border-2 border-gray-600 hover:border-gray-400 transition-colors"
            style={{ backgroundColor: corAvatar(username) }}
          >
            {username.charAt(0).toUpperCase()}
          </button>
          {aberto && (
            <div className="absolute right-0 mt-2 w-48 bg-gray-800 border border-gray-700 rounded-lg shadow-2xl p-4 flex flex-col items-center gap-2 z-50">
              <a
                href={`/u/${encodeURIComponent(username)}`}
                className="flex flex-col items-center gap-2 hover:opacity-80 transition-opacity"
              >
                <div
                  className="w-14 h-14 rounded-full flex items-center justify-center text-white text-xl font-bold border-2 border-gray-600"
                  style={{ backgroundColor: corAvatar(username) }}
                >
                  {username.charAt(0).toUpperCase()}
                </div>
                <span className="text-white font-semibold text-sm">{username}</span>
              </a>
              <button onClick={onLogout} className="text-sm text-gray-400 hover:text-gray-200 underline mt-2">Sair</button>
            </div>
          )}
        </div>
      );
    }

    // Botão de ação de vínculo (amizade ou familiar) no cabeçalho do perfil —
    // os 4 estados descritos na wiki ("Estados do botão"): nenhum vínculo,
    // pendente (eu pedi / me pediram), aceito. Reusado pros dois tipos.
    function VinculoButton({ tipo, rotulo, vinculo, meuId, donoId, onChange }) {
      const [enviando, setEnviando] = useState(false);
      const [erro, setErro] = useState('');
      const [aberto, setAberto] = useState(false);
      const menuRef = useRef(null);

      useEffect(() => {
        const fecharSeClicouFora = (e) => {
          if (menuRef.current && !menuRef.current.contains(e.target)) setAberto(false);
        };
        document.addEventListener('mousedown', fecharSeClicouFora);
        return () => document.removeEventListener('mousedown', fecharSeClicouFora);
      }, []);

      const chamar = async (fn) => {
        setErro(''); setEnviando(true);
        try { await fn(); await onChange(); } catch (err) {
          setErro((err.response && err.response.data && err.response.data.error) || 'Erro ao processar.');
        } finally { setEnviando(false); }
      };

      const pedir = () => chamar(() => axios.post(`${BACKEND_URL}/vinculos`, { destinatario_id: donoId, tipo }));
      const aceitar = () => chamar(() => axios.patch(`${BACKEND_URL}/vinculos/${vinculo.id}`, { status: 'aceito' }));
      const recusarOuCancelar = () => chamar(() => axios.patch(`${BACKEND_URL}/vinculos/${vinculo.id}`, { status: 'recusado' }));
      const desfazer = () => chamar(() => { setAberto(false); return axios.delete(`${BACKEND_URL}/vinculos/${vinculo.id}`); });

      const btnClasse = "px-4 py-2 text-sm font-semibold rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
      let conteudo;
      if (!vinculo || vinculo.status === 'recusado') {
        conteudo = <button disabled={enviando} onClick={pedir} className={`${btnClasse} bg-blue-600 hover:bg-blue-700 text-white`}>Adicionar {rotulo}</button>;
      } else if (vinculo.status === 'pendente' && vinculo.solicitante_id === meuId) {
        // Mesmo padrão do estado "aceito" (botão + dropdown), sem o check —
        // eu que pedi, ainda esperando resposta do outro lado.
        conteudo = (
          <div className="relative" ref={menuRef}>
            <button
              onClick={() => setAberto((a) => !a)}
              className={`${btnClasse} bg-gray-700 hover:bg-gray-600 text-gray-200 flex items-center gap-1.5`}
            >
              {rotulo === 'amigo' ? 'Amigos' : 'Família'}
              <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
              </svg>
            </button>
            {aberto && (
              <div className="absolute left-0 mt-1 w-52 bg-gray-800 border border-gray-700 rounded-lg shadow-2xl p-1.5 z-50">
                <button
                  disabled={enviando}
                  onClick={() => { setAberto(false); recusarOuCancelar(); }}
                  className="w-full text-left text-sm text-red-400 hover:text-red-300 hover:bg-gray-700 px-3 py-2 rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  Cancelar
                </button>
              </div>
            )}
          </div>
        );
      } else if (vinculo.status === 'pendente') {
        // Mesmo padrão do estado "aceito" (botão + dropdown), sem o check —
        // o vínculo ainda não foi aceito, só pedido pra mim.
        conteudo = (
          <div className="relative" ref={menuRef}>
            <button
              onClick={() => setAberto((a) => !a)}
              className={`${btnClasse} bg-gray-700 hover:bg-gray-600 text-gray-200 flex items-center gap-1.5`}
            >
              {rotulo === 'amigo' ? 'Amigos' : 'Família'}
              <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
              </svg>
            </button>
            {aberto && (
              <div className="absolute left-0 mt-1 w-52 bg-gray-800 border border-gray-700 rounded-lg shadow-2xl p-1.5 z-50 flex flex-col gap-1">
                <button
                  disabled={enviando}
                  onClick={() => { setAberto(false); aceitar(); }}
                  className="w-full text-left text-sm text-green-400 hover:text-green-300 hover:bg-gray-700 px-3 py-2 rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  Aceitar
                </button>
                <button
                  disabled={enviando}
                  onClick={() => { setAberto(false); recusarOuCancelar(); }}
                  className="w-full text-left text-sm text-red-400 hover:text-red-300 hover:bg-gray-700 px-3 py-2 rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  Recusar
                </button>
              </div>
            )}
          </div>
        );
      } else {
        conteudo = (
          <div className="relative" ref={menuRef}>
            <button
              onClick={() => setAberto((a) => !a)}
              className={`${btnClasse} bg-gray-700 hover:bg-gray-600 text-gray-200 flex items-center gap-1.5`}
            >
              {rotulo === 'amigo' ? 'Amigos ✓' : 'Família ✓'}
              <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
              </svg>
            </button>
            {aberto && (
              <div className="absolute left-0 mt-1 w-52 bg-gray-800 border border-gray-700 rounded-lg shadow-2xl p-1.5 z-50">
                <button
                  disabled={enviando}
                  onClick={desfazer}
                  className="w-full text-left text-sm text-red-400 hover:text-red-300 hover:bg-gray-700 px-3 py-2 rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  {rotulo === 'amigo' ? 'Desfazer amizade' : 'Desfazer vínculo familiar'}
                </button>
              </div>
            )}
          </div>
        );
      }

      return <div>{conteudo}{erro && <div className="text-xs text-red-400 mt-1">{erro}</div>}</div>;
    }

    // Seção "Solicitações pendentes" — só aparece no próprio perfil (Fase 3c).
    // Sem tabela de notificação própria (decisão registrada na wiki): a fonte
    // é direto GET /vinculos/pendentes.
    function SolicitacoesPendentes({ onResolved }) {
      const [pendentes, setPendentes] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [processando, setProcessando] = useState(null);

      const carregar = useCallback(async () => {
        try {
          const res = await axios.get(`${BACKEND_URL}/vinculos/pendentes`);
          setPendentes(res.data);
        } catch (err) {
          // silencioso — a seção só some se der erro, não é crítico pra tela
        } finally {
          setLoaded(true);
        }
      }, []);

      useEffect(() => { carregar(); }, [carregar]);

      const resolver = async (id, status) => {
        setProcessando(id);
        try {
          await axios.patch(`${BACKEND_URL}/vinculos/${id}`, { status });
          await carregar();
          if (onResolved) onResolved();
        } catch (err) {
          // idem — a pessoa vê o card continuar ali e pode tentar de novo
        } finally {
          setProcessando(null);
        }
      };

      if (!loaded || pendentes.length === 0) return null;

      return (
        <div className="mb-8 space-y-3">
          <h2 className="text-lg font-bold text-white">Solicitações pendentes</h2>
          {pendentes.map((p) => (
            <div key={p.id} className="bg-yellow-900/60 border border-yellow-600 rounded-lg p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
              <p className="text-yellow-50 text-sm">
                <span className="font-semibold">{p.solicitante_username}</span>{' '}
                {p.tipo === 'amizade' ? 'quer ser seu amigo.' : 'quer criar um vínculo familiar com você.'}
              </p>
              <div className="flex gap-2 flex-shrink-0">
                <button disabled={processando === p.id} onClick={() => resolver(p.id, 'aceito')} className="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 rounded-lg text-sm font-semibold text-white">Aceitar</button>
                <button disabled={processando === p.id} onClick={() => resolver(p.id, 'recusado')} className="px-3 py-1.5 bg-red-600 hover:bg-red-700 disabled:opacity-50 rounded-lg text-sm font-semibold text-white">Recusar</button>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // Página de perfil (`/u/:username`) — Fase 3c da #3. Abre na lista pessoal
    // completa (não na comparação); "em comum" é um filtro, desligado por
    // padrão. Origem do jogo nunca aparece aqui — a API do perfil já devolve
    // só jogo+plataforma, sem posse_id/usuario_id (ver GET /usuarios/:username/
    // biblioteca na wiki), então nem tem como vazar por acidente.
    function PerfilPage({ username, meuUsername }) {
      const [perfil, setPerfil] = useState(null);
      const [biblioteca, setBiblioteca] = useState([]);
      const [allGeneros, setAllGeneros] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [emComum, setEmComum] = useState(false);
      const [filters, setFilters] = useState({ titulo: '', plataforma: '', genero: '', gameplay_min: '', gameplay_max: '', metacritic_min: '', metacritic_max: '' });

      const meuId = React.useMemo(() => {
        const payload = decodeJwt(localStorage.getItem('gameLibToken'));
        return payload ? payload.usuario_id : null;
      }, []);
      const ehMeuProprioPerfil = !!meuUsername && meuUsername === username;

      // Mesmo comportamento do handleLogout da index — aqui volta pra "/" em
      // vez de só limpar estado local, já que essa página não tem IndexPage
      // por trás pra re-renderizar sem usuário.
      const handleLogoutPerfil = () => {
        localStorage.removeItem('gameLibToken');
        localStorage.removeItem('gameLibUsername');
        window.location.href = '/';
      };

      const carregarPerfil = useCallback(async () => {
        try {
          const res = await axios.get(`${BACKEND_URL}/usuarios/${encodeURIComponent(username)}/perfil`);
          setPerfil(res.data);
          setError(null);
        } catch (err) {
          setError((err.response && err.response.status === 404) ? 'Usuário não encontrado.' : 'Erro ao carregar o perfil.');
        }
      }, [username]);

      const carregarBiblioteca = useCallback(async () => {
        try {
          const qs = emComum ? '?em_comum=true' : '';
          const res = await axios.get(`${BACKEND_URL}/usuarios/${encodeURIComponent(username)}/biblioteca${qs}`);
          setBiblioteca(res.data);
        } catch (err) {
          // 403 mais provável (em_comum sem amizade) — volta pro estado
          // desligado em vez de deixar a tela travada num erro.
          if (emComum) setEmComum(false);
        }
      }, [username, emComum]);

      useEffect(() => {
        setLoading(true);
        Promise.all([carregarPerfil(), carregarBiblioteca()]).finally(() => setLoading(false));
      }, [carregarPerfil, carregarBiblioteca]);

      useEffect(() => {
        axios.get(`${BACKEND_URL}/generos`).then((res) => setAllGeneros(res.data)).catch(() => {});
      }, []);

      const handleFilterChange = (e) => setFilters((p) => ({ ...p, [e.target.name]: e.target.value }));

      const plataformasComJogo = Array.from(new Set(biblioteca.map((j) => j.plataforma_nome))).sort();

      // Mesmo shape que a index espera do GameCard: precisa de "id" (usa
      // jogo_id, já que não há posse_id aqui — não revelar origem é o ponto).
      const itens = biblioteca
        .filter((j) => !filters.titulo || j.titulo.toLowerCase().includes(filters.titulo.toLowerCase()))
        .filter((j) => !filters.plataforma || j.plataforma_nome === filters.plataforma)
        .filter((j) => !filters.genero || (j.generos && j.generos.includes(filters.genero)))
        .filter((j) => !filters.gameplay_min || j.gameplay_minutos >= filters.gameplay_min * 60)
        .filter((j) => !filters.gameplay_max || j.gameplay_minutos <= filters.gameplay_max * 60)
        .filter((j) => !filters.metacritic_min || j.metacritic >= filters.metacritic_min)
        .filter((j) => !filters.metacritic_max || j.metacritic <= filters.metacritic_max)
        .map((j) => ({ ...j, id: j.jogo_id }));

      if (error) {
        return (
          <div className="container mx-auto p-4 sm:p-6 lg:p-8 text-center">
            <p className="text-red-400 text-xl mt-10">{error}</p>
            <a href="/" className="text-blue-400 hover:text-blue-300 underline mt-4 inline-block">← Voltar pra minha biblioteca</a>
          </div>
        );
      }

      if (loading || !perfil) {
        return <div className="flex justify-center mt-20"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500"></div></div>;
      }

      return (
        <div className="container mx-auto p-4 sm:p-6 lg:p-8 pb-[300px]">
          {/* Mesmo cabeçalho da index (título + menu de conta à direita) — sem
              o menu, navegar pro perfil de outra pessoa deixava a conta "sem
              dono" na tela, sem acesso a Sair/próprio perfil até voltar pra
              index. Sem botão de voltar separado: o próprio título já linka
              pra index, único destino possível por enquanto. */}
          <header className="flex justify-between items-center mb-8">
            <h1 className="text-4xl font-bold text-white">
              <a href="/" className="hover:text-gray-200 transition-colors">Laricks Biblioteca de Jogos</a>
            </h1>
            {meuUsername && <MenuUsuario username={meuUsername} onLogout={handleLogoutPerfil} />}
          </header>

          {/* Cabeçalho estilo Instagram: avatar à esquerda, identidade + ações à direita. */}
          <div className="flex flex-col sm:flex-row items-center sm:items-start gap-6 my-8">
            <div
              className="w-24 h-24 sm:w-32 sm:h-32 rounded-full flex items-center justify-center text-white text-4xl font-bold flex-shrink-0 border-4 border-gray-700"
              style={{ backgroundColor: corAvatar(perfil.username) }}
            >
              {perfil.username.charAt(0).toUpperCase()}
            </div>
            <div className="text-center sm:text-left flex-grow">
              <h1 className="text-3xl font-bold text-white">{perfil.username}</h1>
              {perfil.bio && <p className="text-gray-400 mt-1">{perfil.bio}</p>}
              <div className="flex gap-4 justify-center sm:justify-start mt-3">
                <span className="text-gray-300 text-sm"><span className="font-bold text-white">{perfil.contadores.jogos}</span> jogos</span>
                <span className="text-gray-300 text-sm"><span className="font-bold text-white">{perfil.contadores.amigos}</span> amigos</span>
                <span className="text-gray-300 text-sm"><span className="font-bold text-white">{perfil.contadores.familia}</span> família</span>
              </div>
              {!ehMeuProprioPerfil && (
                <div className="mt-4 flex flex-col sm:flex-row gap-3 items-center sm:items-start">
                  <VinculoButton tipo="amizade" rotulo="amigo" vinculo={perfil.vinculo_amizade} meuId={meuId} donoId={perfil.id} onChange={carregarPerfil} />
                  <VinculoButton tipo="familiar" rotulo="vínculo familiar" vinculo={perfil.vinculo_familiar} meuId={meuId} donoId={perfil.id} onChange={carregarPerfil} />
                </div>
              )}
            </div>
          </div>

          {ehMeuProprioPerfil && <SolicitacoesPendentes onResolved={carregarPerfil} />}

          <div className="bg-gray-800 p-4 rounded-lg mb-8 border border-gray-700">
            <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 items-center">
              <input name="titulo" value={filters.titulo} onChange={handleFilterChange} placeholder="Buscar..." className="p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500" />
              <select name="plataforma" value={filters.plataforma} onChange={handleFilterChange} className="p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500">
                <option value="">Plataformas</option>{plataformasComJogo.map((p) => <option key={p} value={p}>{p}</option>)}
              </select>
              <select name="genero" value={filters.genero} onChange={handleFilterChange} className="p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500">
                <option value="">Gêneros</option>{allGeneros.map((g) => <option key={g.id} value={g.name}>{g.name}</option>)}
              </select>
              <div className="flex gap-2">
                <input name="gameplay_min" type="number" value={filters.gameplay_min} onChange={handleFilterChange} placeholder="Min (h)" className="w-full p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500" />
                <input name="gameplay_max" type="number" value={filters.gameplay_max} onChange={handleFilterChange} placeholder="Máx (h)" className="w-full p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500" />
              </div>
              <div className="flex gap-2">
                <input name="metacritic_min" type="number" value={filters.metacritic_min} onChange={handleFilterChange} placeholder="Meta Min" className="w-full p-2.5 bg-gray-900 text-white rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500" />
                <input name="metacritic_max" type="number" value={filters.metacritic_max} onChange={handleFilterChange} placeholder="Meta Máx" className="w-full p-2.5 bg-gray-900 text-white rounded border border-gray-600 focus:outline-none focus:border-blue-500" />
              </div>
              {/* "Em comum" — filtro, não seção separada (decisão registrada na
                  wiki). Desligado por padrão; se a chamada falhar (403, não são
                  amigos), volta sozinho e o checkbox destrava de novo. */}
              {!ehMeuProprioPerfil && (
                <label className="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
                  <input type="checkbox" checked={emComum} onChange={(e) => setEmComum(e.target.checked)} className="form-checkbox bg-gray-700 border-gray-500 text-blue-500" />
                  Só jogos em comum
                </label>
              )}
            </div>
          </div>

          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 sm:gap-6">
            {itens.length > 0
              ? itens.map((item) => <GameCard key={item.id} jogo={item} readonly={true} />)
              : <div className="col-span-full text-center text-gray-500 mt-10">Nenhum jogo encontrado.</div>}
          </div>
        </div>
      );
    }

    // Roteador mínimo — a primeira rota real do app (Fase 3c da #3). Sem
    // history.pushState/popstate de propósito: navegação normal por <a href>
    // (page reload) já resolve, o nginx já faz fallback pra index.html em
    // qualquer rota, e não vale a complexidade de um router SPA pra uma
    // segunda tela só. Lê a URL uma vez, no mount.
    function App() {
      const path = window.location.pathname;
      const match = path.match(/^\/u\/([^\/]+)\/?$/);
      if (match) {
        const meuUsername = localStorage.getItem('gameLibUsername');
        return <PerfilPage username={decodeURIComponent(match[1])} meuUsername={meuUsername} />;
      }
      return <IndexPage />;
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>

  <!-- ========================================================================= -->
  <!-- 3. INJEÇÃO DO TOWNSQUARE (Roteamento delegado ao Servidor)                -->
  <!-- ========================================================================= -->
  
  <div id="townsquare-target"></div>

  <script>
    window.addEventListener('load', function() {
        setTimeout(function() {
            var target = document.getElementById('townsquare-target');
            if (target) {
                target.style.pointerEvents = 'none';

                // A MÁGICA NATIVA: 
                // Em local, apontamos o TownSquare para o nosso próprio domínio (localhost:8081).
                // Desta forma o navegador não fará CORS! O Nginx Local irá redirecionar o pedido para o contentor TownSquare.
                var isLocal = window.location.hostname === 'localhost' || window.location.hostname.startsWith('192.168.') || window.location.hostname.startsWith('172.');
                var tsServerUrl = isLocal ? window.location.origin : 'https://api.laricks.com.br';

                // Usamos Function para esconder a palavra "import" do olho agressivo do Babel
                var loadTS = new Function("rootElem", "serverUrl", 
                    "return import('/townsquare.mjs').then(function(m) { " +
                        "m.mountTownSquare(rootElem, { server: serverUrl, room: 'laricks-biblioteca' }); " +
                        "setTimeout(function() { " +
                            "Array.from(rootElem.children).forEach(function(child) { " +
                                "child.style.pointerEvents = 'auto'; " +
                            "}); " +
                        "}, 1500); " +
                    "}).catch(console.error);"
                );

                loadTS(target, tsServerUrl);
                console.log('🏰 TownSquare iniciado, roteamento 100% nativo delegado para:', tsServerUrl);
            }
        }, 1000);
    });
  </script>

</body>
