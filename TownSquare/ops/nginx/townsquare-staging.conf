# Nginx server block for the staging TownSquare instance.
#
# Serves staging.townsquare.cauenapier.com from the staging Node process on
# 127.0.0.1:8789. Because staging is its own origin (a subdomain), the widget's
# absolute asset paths (/townsquare.mjs, /widget.css) and the /live websocket all
# resolve against the staging instance with no path rewriting.
#
# The `= /staging` viewing page is served as a static file from disk, decoupled
# from the deployed release, so it survives redeploys and works for ANY branch
# staged on this instance. Its assets and /live still proxy to the staging Node,
# so what you see is the deployed branch's widget, server, and protocol.
#
# Install as /etc/nginx/sites-available/staging.townsquare.cauenapier.com and
# symlink into sites-enabled, then `sudo nginx -t && sudo systemctl reload nginx`.
#
# This file is HTTP-only on purpose: bring it up before DNS/TLS exist. Once the
# subdomain resolves to this host, issue the cert with
#   sudo certbot --nginx -d staging.townsquare.cauenapier.com
# which rewrites this block to add the :443 server and the http->https redirect.
#
# The per-IP / per-scene zones in ops/nginx/townsquare-http-limits.conf must be
# loaded once from the http context (already installed at
# /etc/nginx/conf.d/townsquare-http-limits.conf). Reusing the same zones across
# production and staging is fine.

server {
    listen 80;
    listen [::]:80;
    server_name staging.townsquare.cauenapier.com;

    include snippets/townsquare-server-limits.conf;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Live viewing page: static file on disk, branch-independent.
    location = /staging {
        root /opt/townsquare-staging/web;
        try_files /staging.html =404;
        default_type text/html;
    }

    location = /live {
        if ($townsquare_no_ua) {
            return 403;
        }
        limit_req zone=townsquare_scene_joins burst=20 nodelay;
        limit_req zone=townsquare_live_handshakes burst=15 nodelay;
        proxy_pass http://127.0.0.1:8789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else (widget assets, registration/admin, etc.) -> staging Node.
    location / {
        proxy_pass http://127.0.0.1:8789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
