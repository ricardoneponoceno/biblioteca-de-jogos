# Load from Nginx's http context (for Debian/Ubuntu, /etc/nginx/conf.d/).
map $uri $townsquare_live_client {
    default "";
    /live $binary_remote_addr;
}

limit_conn_zone $townsquare_live_client zone=townsquare_live_connections:10m;
limit_req_zone $townsquare_live_client zone=townsquare_live_handshakes:10m rate=30r/m;

# Block /live WebSocket connections from clients with no User-Agent header.
map $http_user_agent $townsquare_no_ua {
    default 0;
    ""      1;
}

# Rate limit new WebSocket handshakes per scene (siteKey) to cap flooding
# regardless of how many IPs are involved.
map $arg_siteKey $townsquare_scene_key {
    default "";
    ~.+     $arg_siteKey;
}
limit_req_zone $townsquare_scene_key zone=townsquare_scene_joins:10m rate=60r/m;
